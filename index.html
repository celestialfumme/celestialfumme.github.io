<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Celestial Fumme Boutique</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #F5EFE6;
    --gold: #B8986A;
    --gold-light: #D4B483;
    --dark: #1A1612;
    --muted: #7A6E64;
  }
  body {
    background-color: var(--dark);
    color: var(--cream);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }
  .bg {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(184,152,106,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(184,152,106,0.10) 0%, transparent 60%),
      #1A1612;
    z-index: 0;
  }
  .container {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 420px;
    padding: 3rem 2rem 4rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: fadeUp 1s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .logo-ring {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    border: 1px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1.5rem;
    position: relative;
  }
  .logo-ring::before {
    content: '';
    position: absolute;
    inset: 5px;
    border-radius: 50%;
    border: 1px solid rgba(184,152,106,0.3);
  }
  .logo-inner {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-style: italic;
    color: var(--gold);
  }
  .brand-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 300;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--cream);
    text-align: center;
    line-height: 1.2;
    margin-bottom: 0.5rem;
  }
  .brand-sub {
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    text-align: center;
    margin-bottom: 0.75rem;
  }
  .divider {
    width: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 1rem auto 0.6rem;
  }
  .tagline {
    font-size: 12.5px;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-align: center;
    font-style: italic;
    font-family: 'Cormorant Garamond', serif;
    margin-bottom: 2.5rem;
  }
  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .link-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 15px 20px;
    border: 1px solid rgba(184,152,106,0.35);
    border-radius: 2px;
    background: rgba(255,255,255,0.03);
    color: var(--cream);
    text-decoration: none;
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    transition: all 0.3s ease;
    cursor: pointer;
  }
  .link-btn:hover {
    border-color: var(--gold);
    color: var(--gold-light);
    transform: translateY(-1px);
  }
  .link-icon {
    width: 16px;
    height: 16px;
    opacity: 0.7;
    flex-shrink: 0;
  }
  .footer {
    margin-top: 2.5rem;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: rgba(122,110,100,0.5);
    text-transform: uppercase;
    text-align: center;
  }
</style>
</head>
