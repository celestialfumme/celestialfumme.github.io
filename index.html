<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Celestial Fumme Boutique</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--cream:#F5EFE6;--gold:#B8986A;--gold-light:#D4B483;--dark:#1A1612;--muted:#7A6E64}
body{background:var(--dark);color:var(--cream);font-family:'Jost',sans-serif;font-weight:300;min-height:100vh;display:flex;align-items:center;justify-content:center}
.container{width:100%;max-width:420px;padding:3rem 2rem 4rem;display:flex;flex-direction:column;align-items:center}
.logo-ring{width:90px;height:90px;border-radius:50%;border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;margin-bottom:1.5rem}
.logo-inner{font-family:'Cormorant Garamond',serif;font-size:28px;font-style:italic;color:var(--gold)}
.brand-name{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;letter-spacing:0.12em;text-transform:uppercase;color:var(--cream);text-align:center;line-height:1.2;margin-bottom:0.5rem}
.brand-sub{font-size:12px;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold);text-align:center;margin-bottom:0.75rem}
.divider{width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:1rem auto 0.6rem}
.tagline{font-size:13px;color:var(--muted);text-align:center;font-style:italic;font-family:'Cormorant Garamond',serif;margin-bottom:2.5rem}
.links{width:100%;display:flex;flex-direction:column;gap:12px}
.link-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:15px 20px;border:1px solid rgba(184,152,106,0.35);border-radius:2px;background:rgba(255,255,255,0.03);color:var(--cream);text-decoration:none;font-family:'Jost',sans-serif;font-size:13px;font-weight:300;letter-spacing:0.14em;text-transform:uppercase;transition:all 0.3s ease}
.link-btn:hover{border-color:var(--gold);color:var(--gold-light)}
.link-icon{width:16px;height:16px;opacity:0.7;flex-shrink:0}
.footer{margin-top:2.5rem;font-size:11px;letter-spacing:0.1em;color:rgba(122,110,100,0.5);text-transform:uppercase;text-align:center}
</style>
</head>
<body>
<div class="container">
  <div class="logo-ring"><span class="logo-inner">CF</span></div>
  <h1 class="brand-name">Celestial Fumme<br>Boutique</h1>
  <p class="brand-sub">Ulaanbaatar, Mongolia</p>
  <div class="divider"></div>
  <p class="tagline">Wearable elegance, crafted for you</p>
  <div class="links">
    <a class="link-btn" href="https://www.instagram.com/celestialfumme/" target="_blank">
      <svg class="link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="2" y="2" width="20" height="20" rx="5"/>
        <circle cx="12" cy="12" r="4"/>
        <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor"/>
      </svg>
      Instagram
    </a>
    <a class="link-btn" href="https://www.tiktok.com/@celestialfumme" target="_blank">
      <svg class="link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"/>
      </svg>
      TikTok
    </a>
    <a class="link-btn" href="mailto:celestialfumme@gmail.com">
      <svg class="link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="2" y="4" width="20" height="16" rx="2"/>
        <polyline points="2,4 12,13 22,4"/>
      </svg>
      celestialfumme@gmail.com
    </a>
  </div>
  <p class="footer">© 2026 Celestial Fumme Boutique</p>
</div>
</body>
</html>
