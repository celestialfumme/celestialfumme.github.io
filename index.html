<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Celestial Fumme Boutique</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #F5EFE6;
    --warm: #E8D9C5;
    --gold: #B8986A;
    --gold-light: #D4B483;
    --dark: #1A1612;
    --muted: #7A6E64;
  }

  body {
    background-color: var(--dark);
    color: var(--cream);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  .bg {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(184,152,106,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(184,152,106,0.10) 0%, transparent 60%),
      #1A1612;
    z-index: 0;
  }

  .grain {
    position: fixed;
    inset: 0;
    z-index: 1;
    opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 200px;
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 420px;
    padding: 3rem 2rem 4rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    animation: fadeUp 1s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo-ring {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    border: 1px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1.5rem;
    position: relative;
  }

  .logo-ring::before {
    content: '';
    position: absolute;
    inset: 5px;
    border-radius: 50%;
    border: 1px solid rgba(184,152,106,0.3);
  }

  .logo-inner {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-style: italic;
    color: var(--gold);
    letter-spacing: 0.02em;
    line-height: 1;
  }

  .brand-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 300;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--cream);
    text-align: center;
    line-height: 1.2;
    margin-bottom: 0.5rem;
    animation: fadeUp 1s 0.1s ease both;
  }

  .brand-sub {
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    text-align: center;
    margin-bottom: 0.75rem;
    animation: fadeUp 1s 0.15s ease both;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 1rem auto 0.6rem;
    animation: fadeUp 1s 0.2s ease both;
  }

  .tagline {
    font-size: 12.5px;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-align: center;
    font-style: italic;
    font-family: 'Cormorant Garamond', serif;
    margin-bottom: 2.5rem;
    animation: fadeUp 1s 0.25s ease both;
  }

  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .link-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 15px 20px;
    border: 1px solid rgba(184,152,106,0.35);
    border-radius: 2px;
    background: rgba(255,255,255,0.03);
    color: var(--cream);
    text-decoration: none;
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }

  .link-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(184,152,106,0.08), transparent);
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .link-btn:hover {
    border-color: var(--gold);
    color: var(--gold-light);
    transform: translateY(-1px);
  }

  .link-btn:hover::before { opacity: 1; }

  .link-icon {
    width: 16px;
    height: 16px;
    opacity: 0.7;
    flex-shrink: 0;
  }

  .link-btn:nth-child(1) { animation: fadeUp 1s 0.3s ease both; }
  .link-btn:nth-child(2) { animation: fadeUp 1s 0.4s ease both; }

  .footer {
    margin-top: 2.5rem;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: rgba(122,110,100,0.5);
    text-transform: uppercase;
    text-align: center;
    animation: fadeUp 1s 0.5s ease both;
  }
</style>
</head>
<body>
<div class="bg"></div>
<div class="grain"></div>

<div class="container">
  <div class="logo-ring">
    <span class="logo-inner">CF</span>
  </div>

  <h1 class="brand-name">Celestial Fumme<br>Boutique</h1>
  <p class="brand-sub">Ulaanbaatar, Mongolia</p>

  <div class="divider"></div>
  <p class="tagline">Wearable elegance, crafted for you</p>

  <div class="links">
    <a class="link-btn" href="https://www.instagram.com/celestialfumme/" target="_blank">
      <svg class="link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="2" y="2" width="20" height="20" rx="5"/>
        <circle cx="12" cy="12" r="4"/>
        <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor"/>
      </svg>
      Instagram
    </a>

    <a class="link-btn" href="mailto:celestialfumme@gmail.com">
      <svg class="link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="2" y="4" width="20" height="16" rx="2"/>
        <polyline points="2,4 12,13 22,4"/>
      </svg>
      celestialfumme@gmail.com
    </a>
  </div>

  <p class="footer">© 2026 Celestial Fumme Boutique</p>
</div>
</body>
</html>
